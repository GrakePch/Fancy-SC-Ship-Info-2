name: Update Game Data

on:
  workflow_dispatch:
  schedule:
    # Every Saturday at 00:00 UTC+8
    - cron: "0 16 * * 5"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download Game1.zip
        run: |
          curl -fL "https://www.spviewer.eu/api/Game1.zip" -o Game1.zip

      - name: Unzip Game1.zip to Game1 (password protected)
        env:
          ZIP_PASSWORD: "b=>!!bt&&b.__v_TDTQWEbubcbtfisRef===!045M6\\7a3/bweTr0lolo#Honeyp0t?"
        run: |
          rm -rf Game1
          mkdir -p Game1

          if ! command -v 7z >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y p7zip-full
          fi

          7z x -y "-p${ZIP_PASSWORD}" Game1.zip -oGame1

      - name: Format source files into 5 JSON files
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          root = Path("Game1")
          targets = {"0", "1", "2", "3", "4"}

          candidates = [root] + [p for p in root.rglob("*") if p.is_dir()]
          source_dir = None
          for d in candidates:
              names = {p.name for p in d.iterdir() if p.is_file()}
              if targets.issubset(names):
                  source_dir = d
                  break

          if source_dir is None:
              raise SystemExit("Could not find a directory containing files 0,1,2,3,4 inside Game1")

          subprocess.run(
              ["python", "scripts/batchFormatJson.py", str(source_dir)],
              check=True,
          )
          PY

      - name: Preprocess formatted JSON
        run: |
          python scripts/dataPreProc.py batchFormatted/vehicle-basic-list.json

      - name: Copy formatted JSON to src/data
        run: |
          cp -f batchFormatted/vehicle-basic-list.json src/data/vehicle-basic-list.json
          cp -f batchFormatted/vehicle-main-list.json src/data/vehicle-main-list.json
          cp -f batchFormatted/vehicle-hardpoints-list.json src/data/vehicle-hardpoints-list.json
          cp -f batchFormatted/vehicle-item-list.json src/data/vehicle-item-list.json
          cp -f batchFormatted/fps-weapon-list.json src/data/fps-weapon-list.json

      - name: Commit and push changes
        run: |
          if git diff --quiet -- src/data; then
            echo "No data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/vehicle-basic-list.json
          git add src/data/vehicle-main-list.json
          git add src/data/vehicle-hardpoints-list.json
          git add src/data/vehicle-item-list.json
          git add src/data/fps-weapon-list.json
          git commit -m "chore(data): update Game1 data"
          git push origin main
