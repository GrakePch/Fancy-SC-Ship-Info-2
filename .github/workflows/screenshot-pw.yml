name: Screenshot Personal Weapon Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - data-updated

jobs:
  screenshot-pw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Playwright and Chromium
        run: npx playwright install chromium --with-deps

      - name: Start preview server
        run: npx vite preview --port 4173 &
        env:
          CI: "true"

      - name: Wait for server to be ready
        run: |
          echo "Waiting for preview server..."
          timeout 30 bash -c 'until curl -s http://localhost:4173 > /dev/null; do sleep 1; done'
          echo "Server is up."

      - name: Take screenshots
        run: node scripts/screenshot-pw.mjs
        env:
          BASE_URL: "http://localhost:4173"

      - name: Publish screenshots to screenshots branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: screenshots
          publish_dir: ./screenshots/personal_weapon
          destination_dir: personal_weapon
          commit_message: "chore: update personal weapon screenshots [skip ci]"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
