name: Update Vehicle Images on R2

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Regenerate images even when source hashes match the existing manifest"
        required: false
        default: false
        type: boolean
      views:
        description: "Comma-separated views to update"
        required: false
        default: "iso,top"
        type: string
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  update-vehicle-images:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: true
      R2_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate R2 configuration
        run: |
          test -n "${AWS_ACCESS_KEY_ID}" || (echo "Missing secret R2_ACCESS_KEY_ID" && exit 1)
          test -n "${AWS_SECRET_ACCESS_KEY}" || (echo "Missing secret R2_SECRET_ACCESS_KEY" && exit 1)
          [[ "${CLOUDFLARE_ACCOUNT_ID}" =~ ^[a-f0-9]{32}$ ]] || (echo "Missing or invalid secret CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "${R2_BUCKET}" || (echo "Missing variable R2_BUCKET" && exit 1)
          test -n "${R2_PUBLIC_BASE_URL}" || (echo "Missing variable R2_PUBLIC_BASE_URL" && exit 1)

      - name: Check AWS CLI
        run: aws --version

      - name: Check R2 access
        run: |
          aws s3 ls "s3://${R2_BUCKET}" --endpoint-url "${R2_ENDPOINT_URL}" > /dev/null

      - name: Download previous manifest
        run: |
          mkdir -p .cache
          aws s3 cp "s3://${R2_BUCKET}/vehicles/manifest.json" ".cache/vehicle-image-manifest.json" \
            --endpoint-url "${R2_ENDPOINT_URL}" || {
              echo "Previous manifest not found or not readable; continuing as first run."
              exit 0
            }

      - name: Generate vehicle images
        run: |
          args=(--previous-manifest .cache/vehicle-image-manifest.json --views "${{ github.event.inputs.views || 'iso,top' }}")
          if [ "${{ github.event.inputs.force || 'false' }}" = "true" ]; then
            args+=(--force)
          fi
          node scripts/update-vehicle-images.mjs "${args[@]}"

      - name: Upload immutable vehicle images
        run: |
          aws s3 sync ./generated/vehicles "s3://${R2_BUCKET}/vehicles" \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            --exclude "*.json" \
            --content-type "image/webp" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload manifest
        run: |
          aws s3 cp ./generated/vehicles/manifest.json "s3://${R2_BUCKET}/vehicles/manifest.json" \
            --endpoint-url "${R2_ENDPOINT_URL}" \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=300"

      - name: Summarize
        run: |
          node -e "const m=require('./generated/vehicles/manifest.json'); console.log('matched', Object.keys(m.vehicles).length); console.log('missing', m.missing.length); for (const item of m.missing.slice(0, 20)) console.log(JSON.stringify(item));"
